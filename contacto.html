<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f7f7fb;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .contenedor {
            max-width: 600px;
            margin: 60px auto;
            background-color: #ffffff;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            color: #0833a2;
            margin-bottom: 30px;
        }

        label {
            font-weight: 600;
            color: #0833a2;
            display: block;
            margin-bottom: 6px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #d0d7ff;
            font-size: 14px;
            font-family: inherit;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #0833a2;
            box-shadow: 0 0 0 2px rgba(8,51,162,0.15);
        }

        textarea {
            resize: none;
        }

        .boton {
            margin-top: 20px;
            text-align: center;
        }

        input[type="submit"] {
            background-color: #0833a2;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 20px;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        input[type="submit"]:hover {
            background-color: #062a87;
        }

        .volver {
            text-align: center;
            margin-top: 30px;
        }

        .volver a {
            text-decoration: none;
            color: #0833a2;
            font-weight: 500;
        }

        .volver a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="contenedor">

    <h1>Contacto</h1>

    <form>
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre">

        <br><br>

        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com">

        <br><br>

        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escribe tu mensaje aquí..."></textarea>

        <div class="boton">
            <input type="submit" value="Enviar mensaje">
        </div>
    </form>

    <div class="volver">
        <a href="index.html">Volver a la página principal</a>
    </div>

</div>

</body>
</html>
